<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 588" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="pubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gitlabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- ════════════════════════════════════════ -->
  <!-- Public Registries (top) -->
  <!-- ════════════════════════════════════════ -->
  <rect x="260" y="16" width="360" height="72" rx="10" fill="url(#pubGrad)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="40" text-anchor="middle" font-weight="600" fill="#92400e" font-size="14">Public Registries</text>
  <text x="440" y="60" text-anchor="middle" fill="#78350f" font-size="12">PyPI  ·  npmjs.org  ·  Docker Hub  ·  GHCR</text>
  <text x="440" y="76" text-anchor="middle" fill="#92400e" font-size="11" font-style="italic">Untrusted upstream</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Arrows: Public -> Proxies -->
  <!-- ════════════════════════════════════════ -->
  <line x1="360" y1="88" x2="220" y2="134" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <line x1="440" y1="88" x2="440" y2="134" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <line x1="520" y1="88" x2="660" y2="134" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Caching Proxies (middle row) -->
  <!-- ════════════════════════════════════════ -->
  <!-- devpi -->
  <rect x="100" y="138" width="240" height="64" rx="10" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="162" text-anchor="middle" font-weight="600" fill="#1e40af" font-size="14">devpi</text>
  <text x="220" y="180" text-anchor="middle" fill="#1e3a8a" font-size="11">PyPI caching proxy</text>
  <text x="220" y="194" text-anchor="middle" fill="#3b82f6" font-size="10">pip / uv resolve here first</text>

  <!-- Verdaccio -->
  <rect x="360" y="138" width="160" height="64" rx="10" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="162" text-anchor="middle" font-weight="600" fill="#1e40af" font-size="14">Verdaccio</text>
  <text x="440" y="180" text-anchor="middle" fill="#1e3a8a" font-size="11">npm caching proxy</text>
  <text x="440" y="194" text-anchor="middle" fill="#3b82f6" font-size="10">npm resolves here first</text>

  <!-- GitLab Dependency Proxy -->
  <rect x="540" y="138" width="240" height="64" rx="10" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="162" text-anchor="middle" font-weight="600" fill="#1e40af" font-size="14">GitLab Dependency Proxy</text>
  <text x="660" y="180" text-anchor="middle" fill="#1e3a8a" font-size="11">Docker Hub image cache</text>
  <text x="660" y="194" text-anchor="middle" fill="#3b82f6" font-size="10">Built into GitLab (no extra infra)</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Arrows: Proxies -> GitLab box -->
  <!-- ════════════════════════════════════════ -->
  <line x1="220" y1="202" x2="220" y2="244" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="440" y1="202" x2="440" y2="244" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="660" y1="202" x2="660" y2="244" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ════════════════════════════════════════ -->
  <!-- GitLab Instance (large box) -->
  <!-- ════════════════════════════════════════ -->
  <rect x="60" y="248" width="760" height="160" rx="12" fill="url(#gitlabGrad)" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="274" text-anchor="middle" font-weight="700" fill="#9d174d" font-size="15">GitLab Instance</text>
  <text x="440" y="290" text-anchor="middle" fill="#be185d" font-size="11">(SaaS or Self-Hosted)</text>

  <!-- Package Registry sub-box -->
  <rect x="100" y="304" width="320" height="84" rx="8" fill="white" stroke="#f9a8d4" stroke-width="1" opacity="0.9"/>
  <text x="260" y="328" text-anchor="middle" font-weight="600" fill="#9d174d" font-size="13">Package Registry</text>
  <text x="260" y="346" text-anchor="middle" fill="#831843" font-size="11">Private Python packages (PyPI)</text>
  <text x="260" y="362" text-anchor="middle" fill="#831843" font-size="11">Private npm packages (@scope)</text>
  <text x="260" y="378" text-anchor="middle" fill="#be185d" font-size="10" font-style="italic">Your internal libraries only</text>

  <!-- Container Registry sub-box -->
  <rect x="460" y="304" width="320" height="84" rx="8" fill="white" stroke="#f9a8d4" stroke-width="1" opacity="0.9"/>
  <text x="620" y="328" text-anchor="middle" font-weight="600" fill="#9d174d" font-size="13">Container Registry</text>
  <text x="620" y="346" text-anchor="middle" fill="#831843" font-size="11">Private Docker / OCI images</text>
  <text x="620" y="362" text-anchor="middle" fill="#831843" font-size="11">Cosign-signed, SBOM-attached</text>
  <text x="620" y="378" text-anchor="middle" fill="#be185d" font-size="10" font-style="italic">Your application images</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Arrows: GitLab -> Consumers -->
  <!-- ════════════════════════════════════════ -->
  <line x1="240" y1="408" x2="160" y2="454" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <line x1="440" y1="408" x2="440" y2="454" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <line x1="620" y1="408" x2="720" y2="454" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowPink)"/>

  <!-- ════════════════════════════════════════ -->
  <!-- Consumers (bottom row) -->
  <!-- ════════════════════════════════════════ -->
  <!-- Dev Machine -->
  <rect x="60" y="458" width="200" height="80" rx="10" fill="url(#clientGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="484" text-anchor="middle" font-weight="600" fill="#065f46" font-size="14">Developer Machines</text>
  <text x="160" y="502" text-anchor="middle" fill="#064e3b" font-size="11">pip / uv / npm / docker</text>
  <text x="160" y="518" text-anchor="middle" fill="#064e3b" font-size="11">Configured via setup script</text>
  <text x="160" y="532" text-anchor="middle" fill="#10b981" font-size="10">pip.conf · .npmrc · ~/.netrc</text>

  <!-- CI/CD Runners -->
  <rect x="340" y="458" width="200" height="80" rx="10" fill="url(#clientGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="484" text-anchor="middle" font-weight="600" fill="#065f46" font-size="14">CI/CD Runners</text>
  <text x="440" y="502" text-anchor="middle" fill="#064e3b" font-size="11">Build, scan, sign, publish</text>
  <text x="440" y="518" text-anchor="middle" fill="#064e3b" font-size="11">CI_JOB_TOKEN auth</text>
  <text x="440" y="532" text-anchor="middle" fill="#10b981" font-size="10">Trivy · Cosign · Gitleaks</text>

  <!-- Production -->
  <rect x="620" y="458" width="200" height="80" rx="10" fill="url(#clientGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="484" text-anchor="middle" font-weight="600" fill="#065f46" font-size="14">Production</text>
  <text x="720" y="502" text-anchor="middle" fill="#064e3b" font-size="11">Pulls signed images only</text>
  <text x="720" y="518" text-anchor="middle" fill="#064e3b" font-size="11">Pinned digests + lockfiles</text>
  <text x="720" y="532" text-anchor="middle" fill="#10b981" font-size="10">cosign verify before deploy</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ════════════════════════════════════════ -->
  <rect x="60" y="554" width="760" height="22" rx="4" fill="none"/>
  <line x1="80" y1="565" x2="110" y2="565" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="116" y="569" fill="#6b7280" font-size="10">Upstream fetch (on cache miss)</text>
  <line x1="310" y1="565" x2="340" y2="565" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="346" y="569" fill="#3b82f6" font-size="10">Cached package flow</text>
  <line x1="500" y1="565" x2="530" y2="565" stroke="#ec4899" stroke-width="1.5"/>
  <text x="536" y="569" fill="#ec4899" font-size="10">Private artifact flow</text>
  <rect x="680" y="558" width="14" height="14" rx="3" fill="url(#pubGrad)" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="700" y="569" fill="#92400e" font-size="10">Public</text>
  <rect x="740" y="558" width="14" height="14" rx="3" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="0.75"/>
  <text x="760" y="569" fill="#1e40af" font-size="10">Cache</text>
  <rect x="796" y="558" width="14" height="14" rx="3" fill="url(#gitlabGrad)" stroke="#ec4899" stroke-width="0.75"/>
  <text x="816" y="569" fill="#9d174d" font-size="10">GitLab</text>
</svg>

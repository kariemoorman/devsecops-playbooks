# docker-build-sign-push.gitlab-ci.yml
#
# Build a Docker image, scan for vulnerabilities, sign with Cosign,
# and push to the GitLab Container Registry.
#
# Prerequisites:
#   - CI/CD variable COSIGN_PRIVATE_KEY: base64-encoded Cosign private key
#   - CI/CD variable COSIGN_PASSWORD: passphrase for the Cosign key
#   - Container Registry enabled on the GitLab project
#
# Usage:
#   include:
#     - project: 'my-org/cicd-templates'
#       file: '/cicd/docker-build-sign-push.gitlab-ci.yml'
#
# References:
#   - https://docs.gitlab.com/ee/user/packages/container_registry/
#   - https://docs.gitlab.com/ee/ci/docker/using_docker_build.html
#   - https://docs.sigstore.dev/cosign/overview/

stages:
  - build
  - scan
  - sign
  - push

variables:
  # Use BuildKit for better caching and multi-stage support
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"
  # Image naming
  IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  IMAGE_TAG_SHA: "${CI_COMMIT_SHA}"
  IMAGE_TAG_REF: "${CI_COMMIT_REF_SLUG}"
  # Trivy configuration
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_EXIT_CODE: "1"  # Fail pipeline on HIGH/CRITICAL vulnerabilities

# ──────────────────────────────────────────────────
# Build
# ──────────────────────────────────────────────────

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo "${CI_JOB_TOKEN}" | docker login ${CI_REGISTRY} -u gitlab-ci-token --password-stdin
  script:
    - echo "=== Building Docker image ==="
    - |
      docker build \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.title=${CI_PROJECT_NAME}" \
        --tag "${IMAGE_NAME}:${IMAGE_TAG_SHA}" \
        --tag "${IMAGE_NAME}:${IMAGE_TAG_REF}" \
        .
    - echo "=== Saving image for subsequent stages ==="
    - docker save "${IMAGE_NAME}:${IMAGE_TAG_SHA}" | gzip > image.tar.gz
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 2 hours
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ──────────────────────────────────────────────────
# Scan
# ──────────────────────────────────────────────────

scan-image:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["build-image"]
  script:
    - echo "=== Scanning image for vulnerabilities ==="
    - |
      trivy image \
        --input image.tar.gz \
        --severity ${TRIVY_SEVERITY} \
        --exit-code ${TRIVY_EXIT_CODE} \
        --format table \
        --output trivy-report.txt
    - echo "=== Generating SBOM ==="
    - |
      trivy image \
        --input image.tar.gz \
        --format cyclonedx \
        --output sbom.json
  artifacts:
    paths:
      - trivy-report.txt
      - sbom.json
    reports:
      cyclonedx:
        - sbom.json
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: false

# ──────────────────────────────────────────────────
# Push
# ──────────────────────────────────────────────────

push-image:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  needs: ["build-image", "scan-image"]
  before_script:
    - echo "${CI_JOB_TOKEN}" | docker login ${CI_REGISTRY} -u gitlab-ci-token --password-stdin
  script:
    - echo "=== Loading and pushing image ==="
    - docker load < image.tar.gz
    - docker push "${IMAGE_NAME}:${IMAGE_TAG_SHA}"
    - docker push "${IMAGE_NAME}:${IMAGE_TAG_REF}"
    # Tag as latest on default branch
    - |
      if [ "${CI_COMMIT_BRANCH}" = "${CI_DEFAULT_BRANCH}" ]; then
        docker tag "${IMAGE_NAME}:${IMAGE_TAG_SHA}" "${IMAGE_NAME}:latest"
        docker push "${IMAGE_NAME}:latest"
      fi
    # Tag with version on git tags
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        docker tag "${IMAGE_NAME}:${IMAGE_TAG_SHA}" "${IMAGE_NAME}:${CI_COMMIT_TAG}"
        docker push "${IMAGE_NAME}:${CI_COMMIT_TAG}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ──────────────────────────────────────────────────
# Sign (optional, requires Cosign setup)
# ──────────────────────────────────────────────────

sign-image:
  stage: sign
  image: alpine:3.19
  needs: ["push-image"]
  before_script:
    - apk add --no-cache cosign
  script:
    - echo "=== Signing image with Cosign ==="
    - |
      # Decode the private key from CI/CD variable
      echo "${COSIGN_PRIVATE_KEY}" | base64 -d > /tmp/cosign.key
    - |
      cosign sign \
        --key /tmp/cosign.key \
        --yes \
        "${IMAGE_NAME}:${IMAGE_TAG_SHA}"
    - |
      # Attach SBOM to the image signature
      if [ -f sbom.json ]; then
        cosign attach sbom \
          --sbom sbom.json \
          "${IMAGE_NAME}:${IMAGE_TAG_SHA}"
      fi
    - rm -f /tmp/cosign.key
  rules:
    - if: $CI_COMMIT_TAG
      when: manual  # Require manual approval for signing
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

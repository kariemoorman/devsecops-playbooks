# publish-private-package.gitlab-ci.yml
#
# Publish internal/private packages to the GitLab Package Registry
# on tagged releases. Supports both Python (PyPI) and npm packages.
#
# Usage:
#   Include this template in your project's .gitlab-ci.yml:
#
#   include:
#     - project: 'my-org/cicd-templates'
#       file: '/cicd/publish-private-package.gitlab-ci.yml'
#
#   Then tag a release:
#     git tag v1.2.3 && git push --tags
#
# Reference:
#   - https://docs.gitlab.com/ee/user/packages/pypi_repository/
#   - https://docs.gitlab.com/ee/user/packages/npm_registry/

stages:
  - test
  - build
  - publish

# ──────────────────────────────────────────────────
# Python Package Publishing
# ──────────────────────────────────────────────────

.python-base:
  image: python:3.12-slim
  before_script:
    - pip install --quiet build twine

test-python:
  extends: .python-base
  stage: test
  script:
    - pip install -e ".[dev]" 2>/dev/null || pip install -e .
    - python -m pytest tests/ -v --tb=short
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Only run if Python files exist
    - exists:
        - pyproject.toml
        - setup.py
        - setup.cfg

build-python:
  extends: .python-base
  stage: build
  script:
    - python -m build
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
      exists:
        - pyproject.toml
        - setup.py
        - setup.cfg

publish-python:
  extends: .python-base
  stage: publish
  needs: ["test-python", "build-python"]
  script:
    - echo "=== Publishing Python package to GitLab Package Registry ==="
    - |
      twine upload \
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        -u gitlab-ci-token \
        -p "${CI_JOB_TOKEN}" \
        dist/*
    - echo "=== Package published successfully ==="
    - echo "Install with:"
    - echo "  pip install <package> --index-url https://gitlab.example.com/api/v4/projects/${CI_PROJECT_ID}/packages/pypi/simple"
  rules:
    - if: $CI_COMMIT_TAG
      exists:
        - pyproject.toml
        - setup.py
        - setup.cfg

# ──────────────────────────────────────────────────
# npm Package Publishing
# ──────────────────────────────────────────────────

test-npm:
  image: node:20-slim
  stage: test
  script:
    - npm ci
    - npm test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - exists:
        - package.json

publish-npm:
  image: node:20-slim
  stage: publish
  needs: ["test-npm"]
  script:
    - echo "=== Configuring npm registry ==="
    - |
      # Set the registry for the package scope
      # Extract scope from package.json name field
      SCOPE=$(node -e "const p=require('./package.json'); const m=p.name.match(/^@([^/]+)/); console.log(m ? m[1] : '')")
      if [ -z "$SCOPE" ]; then
        echo "ERROR: Package name must be scoped (e.g., @myorg/package-name)"
        exit 1
      fi
      echo "@${SCOPE}:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" >> .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "=== Publishing npm package ==="
    - npm publish
    - echo "=== Package published successfully ==="
  rules:
    - if: $CI_COMMIT_TAG
      exists:
        - package.json
